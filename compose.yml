name: isimcha-assessment

services:
  postgres:
    image: postgres:18-alpine
    container_name: isimcha-assessment-db
    restart: unless-stopped
    # Run as the host user so files written to ./postgres-data/ are owned by
    # you, not UID 70 inside the container. Defaults match the repo owner;
    # override in .env if your UID/GID differ.
    user: "${POSTGRES_UID}:${POSTGRES_GID}"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # PGDATA at the mount root keeps everything in one tidy place and
      # avoids a nested subdirectory the host user would have to chmod.
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      # Init scripts run only when the data directory is empty — i.e. on
      # the very first bootstrap, before postgres-data is committed.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --username=postgres --dbname=postgres
      interval: 5s
      timeout: 5s
      retries: 10
